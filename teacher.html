<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Панель преподавателя</title>
    <link rel="stylesheet" href="style.css">
    <script src="chart.min.js"></script>
</head>
<body>
<div class="container">
    <h1>Панель преподавателя</h1>

    <div class="tabs">
        <button class="tab active" onclick="showTab('create', this)">Создать тест</button>
        <button class="tab" onclick="showTab('edit', this)">Редактировать</button>
        <button class="tab" onclick="showTab('results', this)">Результаты</button>
    </div>

    <!-- Вкладка: Создать тест -->
    <div id="tab-create">
        <div id="message" class="hidden"></div>
        <input type="text" id="testTitle" placeholder="Название теста">
        <div style="display:flex; align-items:center; gap:15px; margin-bottom:15px;">
            <label style="font-size:14px; color:#555;">Количество попыток:</label>
            <input type="number" id="maxAttempts" value="1" min="1" max="10"
                   style="width:80px; margin:0;">
        </div>
        <div id="questions"></div>
        <div style="display:flex; gap:10px; margin-top:10px;">
            <button onclick="addQuestion()">+ Добавить вопрос</button>
            <button onclick="saveTest()" style="background:#27ae60;">Сохранить тест</button>
        </div>
    </div>

    <!-- Вкладка: Редактировать -->
    <div id="tab-edit" class="hidden">
        <div id="saved-tests-block" style="margin-bottom:20px;">
            <h3 style="margin-bottom:10px;">Мои тесты</h3>
            <div id="saved-tests-list"></div>
        </div>
        <div style="display:flex; gap:10px; margin-bottom:20px; align-items:center;">
            <input type="text" id="editTestId" placeholder="ID теста" style="width:200px;">
            <button onclick="loadTestForEdit()">Загрузить</button>
        </div>
        <div id="edit-content" class="hidden">
            <div style="display:flex; align-items:center; gap:10px; margin-bottom:15px;">
    <input type="text" id="edit-test-title-input" style="font-size:18px; font-weight:bold; flex:1;">
    <button onclick="saveTestTitle()">Сохранить название</button>
</div>
            <div style="display:flex; align-items:center; gap:15px; margin-bottom:15px;">
                <label style="font-size:14px; color:#555;">Количество попыток:</label>
                <input type="number" id="edit-max-attempts" value="1" min="1" max="10"
                       style="width:80px; margin:0;">
                <button onclick="saveMaxAttempts()">Сохранить</button>
            </div>
            <div id="edit-questions-list"></div>
            <hr style="margin:20px 0;">
            <h3>Добавить новые вопросы</h3>
            <div id="edit-new-questions"></div>
            <div style="display:flex; gap:10px; margin-top:10px;">
                <button onclick="addEditQuestion()">+ Добавить вопрос</button>
                <button onclick="saveNewQuestions()" style="background:#27ae60;">Сохранить</button>
            </div>
        </div>
    </div>

    <!-- Вкладка: Результаты -->
    <div id="tab-results" class="hidden">
        <div style="display:flex; gap:10px; margin-bottom:20px; align-items:center;">
            <input type="text" id="resultTestId" placeholder="ID теста" style="width:200px;">
            <button onclick="loadResults()">Загрузить результаты</button>
        </div>
        <div id="summary" class="hidden">
            <h2>Общая статистика</h2>
            <div id="summary-cards" class="cards-row"></div>
            <div style="display:flex; gap:20px; margin-top:25px; flex-wrap:wrap;">
                <div style="flex:1; min-width:280px; background:#f9f9f9; border-radius:8px; padding:15px;">
                    <h3 style="margin-bottom:15px; font-size:14px; color:#555;">Распределение баллов</h3>
                    <canvas id="chartScores"></canvas>
                </div>
                <div style="flex:1; min-width:280px; background:#f9f9f9; border-radius:8px; padding:15px;">
                    <h3 style="margin-bottom:15px; font-size:14px; color:#555;">Средний балл по вопросам</h3>
                    <canvas id="chartQuestions"></canvas>
                </div>
            </div>
            <div id="questions-stats" style="margin-top:20px;"></div>
        </div>
        <div id="students" class="hidden">
            <h2 style="margin-top:30px;">По каждому ученику</h2>
            <div id="students-list"></div>
        </div>
    </div>

</div>
<script src="script.js"></script>
</body>
</html>
